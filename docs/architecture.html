const tt = document.getElementById('tt');
function tip(el, text) {
  el.addEventListener('mouseenter', e => {
    tt.innerHTML = text; 
    tt.style.display = 'block';
    setTimeout(() => tt.classList.add('show'), 10);
    tt.style.left = (e.clientX+12)+'px'; tt.style.top = (e.clientY-8)+'px';
  });
  el.addEventListener('mousemove', e => {
    tt.style.left = (e.clientX+12)+'px'; tt.style.top = (e.clientY-8)+'px';
  });
  el.addEventListener('mouseleave', () => { 
    tt.classList.remove('show');
    setTimeout(() => { if(!tt.classList.contains('show')) tt.style.display = 'none'; }, 200);
  });
}

function show(key) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.toLowerCase().includes(key === 'flow' ? 'page' : key === 'state' ? 'state' : 'virtual')));
  ['flow','state','vdom'].forEach(k => {
    document.getElementById('legend-'+k).style.display = k===key ? 'flex' : 'none';
  });
  const panel = document.getElementById('panel');
  panel.style.opacity = '0';
  panel.classList.remove('svg-loaded');
  setTimeout(() => {
    panel.innerHTML = svgs[key];
    panel.style.opacity = '1';
    panel.classList.add('svg-loaded');
    setupTooltips(key);
  }, 300);
}

function setupTooltips(key) {
  const tips = {
    'n-home': 'Pure presentational, Links to /shop and /sell, No hooks or state',
    'n-shop': 'Receives products[], addToCart, addToWishlist, cartItems via props, Local filter state',
    'n-sell': 'Controlled form via useState, Calls addProduct() prop, useNavigate to /shop on submit',
    'n-cart': 'Derives cart items by matching cartItems[] IDs against products[], clearCart on order',
    'n-pd': 'useParams() reads :id from URL, finds product in products[], useNavigate for back button',
    'n-arch': 'useParams() reads :handle, filters products by sellerId field, no local state',
    'n-wish': 'Pure render of wishlist[] filtered from products[], removeFromWishlist callback',
    'n-look': 'Pure static JSX, No hooks, No props, Fastest possible render',
    'n-jour': 'Pure static JSX, Journal entries hardcoded, No side effects',
    'n-mani': 'Pure static JSX, Brand manifesto, Completely isolated from state'
  };
  Object.entries(tips).forEach(([id, text]) => {
    const el = document.getElementById(id);
    if (el) tip(el, text);
  });
}
